; MF Rebalancer - MFD pack settings
; Copy to mfd_pack.ini next to MFRebalancerV1.1.exe (or MFRebalancerPack.exe) and edit paths.
; (UTF-8 is fine; if you use Notepad, "UTF-8" is OK — the app accepts a BOM.)
; Paths may be absolute (e.g. D:\Work\holdings) or relative to the folder
; containing the .exe (e.g. data\clients\by_client).
;
; V1.1: optional Step 1 — run: MFRebalancerV1.1.exe --bootstrap-client-risk
;        to build client_risk_pref.xlsx from your holdings folder; fill age + risk_preference.
;        INI key client_risk_pref= is an alias for client_ages= (same workbook).
;
; After saving, double-click the exe (no command line needed).
; Command-line arguments override these values when both are used.

[mfd_pack]
; Folder with one holdings file per client (xlsx/csv), filename stem = client_id
; Holdings: ISIN and units columns are auto-detected (no per-column INI). First row = headers.
clients_folder = data\dummy_clients\by_client

; NAV master (latestNAV_Reports sheet). Leave blank for default (live data\latestNAV_Reports.xlsx or newest backup).
; master =

; Output workbook and optional manifest (manifest blank = next to output with _manifest.json)
output = output\generate_transactions.xlsx
; manifest =

; Averse | Moderate | Aggressive (fixed mode, OR fallback when age_based = true and client missing from sidecar)
archetype = Moderate

; Fresh cash per client (INR); use 0 for pure recycling (buy/sell nets to zero)
new_cash = 0

; Per-client glide: equity % (0-100) = 100 - k x age; k from risk_preference in sidecar. Un-comment to enable.
; age_based = true
; client_ages = data\dummy_clients\client_ages.xlsx
; client_risk_pref = data\client_risk_pref.xlsx

; New-fund BUY pools (FundChoices sheet). invest_in_existing_funds_only = false also enables this.
; V1.1 pack ships data\fund_choices_template.xlsx — edit FundChoices rows (ISIN, sleeve, weight).
; allow_new_funds = true
; fund_choices = data\fund_choices_template.xlsx

; Optional: debt_cash | debt_cash_other — leave blank to use value from config.py
; defensive_buckets =
